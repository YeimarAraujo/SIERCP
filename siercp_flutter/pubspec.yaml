name: siercp
description: Sistema Inteligente de Entrenamiento de Reanimación Cardiopulmonar
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # ── Navegación ──────────────────────────────────────────────────────────
  go_router: ^14.6.2

  # ── Estado ──────────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Firebase ────────────────────────────────────────────────────────────
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.4
  firebase_storage: ^12.3.7
  firebase_messaging: ^15.1.4
  firebase_database: ^11.3.10

  # ── Gráficas ────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── UI ──────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  syncfusion_flutter_gauges: ^28.1.33 # ← versión estable LTS, evita breaking changes
  syncfusion_flutter_pdfviewer: ^28.1.33

  # ── PDF viewer ──────────────────────────────────────────────────────────
  flutter_pdfview: ^1.3.2

  # ── YouTube — CAMBIO CRÍTICO ─────────────────────────────────────────────
  # youtube_player_flutter 8.x usa flutter_inappwebview 5.x internamente → rompe AGP 8+
  # Alternativa: youtube_player_iframe usa webview_flutter oficial de Google
  youtube_player_iframe: ^5.1.3

  # ── Archivos ────────────────────────────────────────────────────────────
  file_picker: ^8.1.7

  # ── Utilitarios ─────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  http: ^1.6.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.4

  # ── Exportación PDF / CSV ────────────────────────────────────────────────
  pdf: ^3.10.8
  share_plus: ^10.1.4 # ← era 7.2.2, salto mayor necesario (AGP + bugs)
  printing: ^5.13.1

  # ── Audio ────────────────────────────────────────────────────────────────
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.5 # ← alineado con riverpod_annotation: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
